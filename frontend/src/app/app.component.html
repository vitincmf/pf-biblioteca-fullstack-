<header>
  <div>
    <h1>Biblioteca</h1>
    <p>Angular + Django API</p>
  </div>

  <nav>
    <a routerLink="/login" *ngIf="!usuario">Login</a>
    <a routerLink="/cadastro" *ngIf="!usuario">Cadastro</a>
    <a routerLink="/aluno/dashboard" *ngIf="usuario?.perfil === 'aluno'">Aluno</a>
    <a routerLink="/funcionario/dashboard" *ngIf="usuario?.perfil === 'funcionario'">Funcionario</a>
    <a routerLink="/livros" *ngIf="usuario">Livros</a>
    <a routerLink="/historico" *ngIf="usuario">Historico</a>
    <button type="button" class="secondary" *ngIf="usuario" (click)="logout()">Sair</button>
  </nav>
</header>

<main>
  <router-outlet></router-outlet>
</main>
