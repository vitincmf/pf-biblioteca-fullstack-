<header>
  <div>
    <h1>Biblioteca</h1>
    <p>Angular + Django API</p>
  </div>

  <nav>
    <a routerLink="/login" *ngIf="!usuario">Login</a>
    <a routerLink="/cadastro" *ngIf="!usuario">Cadastro</a>
    <a routerLink="/aluno/dashboard" *ngIf="usuario?.perfil === 'aluno'">Aluno</a>
    <a routerLink="/aluno/livros" *ngIf="usuario?.perfil === 'aluno'">Livros</a>
    <a routerLink="/aluno/historico" *ngIf="usuario?.perfil === 'aluno'">Historico</a>
    <a routerLink="/aluno/perfil" *ngIf="usuario?.perfil === 'aluno'">Perfil</a>
    <a routerLink="/funcionario/dashboard" *ngIf="usuario?.perfil === 'funcionario'">Funcionario</a>
    <a routerLink="/funcionario/livros" *ngIf="usuario?.perfil === 'funcionario'">Livros</a>
    <a routerLink="/funcionario/categorias" *ngIf="usuario?.perfil === 'funcionario'">Categorias</a>
    <a routerLink="/funcionario/emprestimos" *ngIf="usuario?.perfil === 'funcionario'">Emprestimos</a>
    <a routerLink="/funcionario/relatorio" *ngIf="usuario?.perfil === 'funcionario'">Relatorio</a>
    <a routerLink="/funcionario/perfil" *ngIf="usuario?.perfil === 'funcionario'">Perfil</a>
    <button type="button" class="secondary" *ngIf="usuario" (click)="logout()">Sair</button>
  </nav>
</header>

<main>
  <router-outlet></router-outlet>
</main>
